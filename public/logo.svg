<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Intense realistic red glow filter for the haki/lightning cracks -->
    <filter id="haki-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Straw Hat Gold Gradient -->
    <linearGradient id="strawHatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="60%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Braided Rope Gold-Bronze Gradient -->
    <linearGradient id="ropeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400e" />
      <stop offset="30%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#fef08a" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>

    <!-- Deep Ocean Waves Circular Background Gradient -->
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="40%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- Solid dark container outline background to make the logo pop on any tab (dark/light) -->
  <rect width="512" height="512" rx="128" fill="#030712" />

  <!-- The Celestial Rope Frame & Sea Crest -->
  <g id="rope-badge" transform="translate(0, 0)">
    <!-- Sea water base circle -->
    <circle cx="256" cy="256" r="145" fill="url(#oceanGrad)" />

    <!-- Stylized waves inside the ocean crest -->
    <path d="M120 260 Q180 240, 240 270 T360 250" fill="none" stroke="#2563eb" stroke-width="4" opacity="0.3" stroke-linecap="round" />
    <path d="M130 300 Q200 285, 260 310 T380 280" fill="none" stroke="#3b82f6" stroke-width="5" opacity="0.4" stroke-linecap="round" />
    <path d="M115 220 Q170 200, 230 230 T350 210" fill="none" stroke="#1d4ed8" stroke-width="4" opacity="0.2" stroke-linecap="round" />

    <!-- Twisted outer golden rope ring (double stroke overlapping to look beautifully braided) -->
    <circle cx="256" cy="256" r="148" fill="none" stroke="url(#ropeGrad)" stroke-width="14" stroke-dasharray="24,14" stroke-linecap="round" />
    <circle cx="256" cy="256" r="148" fill="none" stroke="#111827" stroke-width="14" stroke-dasharray="14,24" opacity="0.15" />
    <circle cx="256" cy="256" r="155" fill="none" stroke="#000000" stroke-width="3" />
    <circle cx="256" cy="256" r="141" fill="none" stroke="#000000" stroke-width="3" />
  </g>

  <!-- The Classic Straw Hat Jolly Roger (Skull & Crossed Bones) -->
  <g id="jolly-roger">
    
    <!-- Crossed Bones (Grouped) -->
    <g id="bones" fill="#ffffff" stroke="#0f172a" stroke-width="8" stroke-linejoin="round">
      
      <!-- Bone 1: Top-Left to Bottom-Right -->
      <!-- Shaft -->
      <path d="M 140 140 L 372 372" stroke="#ffffff" stroke-width="28" stroke-linecap="round" />
      <path d="M 140 140 L 372 372" stroke="#0f172a" stroke-width="8" stroke-linecap="round" fill="none" />
      
      <!-- Joint Knuckles TL -->
      <circle cx="132" cy="148" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="7" />
      <circle cx="148" cy="132" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="7" />
      
      <!-- Joint Knuckles BR -->
      <circle cx="364" cy="380" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="7" />
      <circle cx="380" cy="364" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="7" />

      <!-- Bone 2: Top-Right to Bottom-Left -->
      <!-- Shaft -->
      <path d="M 372 140 L 140 372" stroke="#ffffff" stroke-width="28" stroke-linecap="round" />
      <path d="M 372 140 L 140 372" stroke="#0f172a" stroke-width="8" stroke-linecap="round" fill="none" />
      
      <!-- Joint Knuckles TR -->
      <circle cx="380" cy="148" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="7" />
      <circle cx="364" cy="132" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="7" />
      
      <!-- Joint Knuckles BL -->
      <circle cx="148" cy="380" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="7" />
      <circle cx="132" cy="364" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="7" />
    </g>

    <!-- Skull Face structure and jaw -->
    <!-- Draw background shadows separately to give incredible depth -->
    <path d="M 256 142 C 185 142, 175 235, 198 262 C 204 270, 214 276, 219 288 C 221 293, 215 318, 215 345 C 215 358, 227 362, 256 362 C 285 362, 297 358, 297 345 C 297 318, 291 293, 293 288 C 298 276, 308 270, 314 262 C 337 235, 327 142, 256 142 Z" 
          fill="#ffffff" stroke="#0f172a" stroke-width="9" stroke-linejoin="round" />

    <!-- Eye Sockets (Deep black/navy hollow look, matching the Luffy flag style) -->
    <ellipse cx="226" cy="224" rx="16" ry="20" fill="#0f172a" />
    <ellipse cx="286" cy="224" rx="16" ry="20" fill="#0f172a" />

    <!-- Nose Cavity (inverted heart shape) -->
    <path d="M 256 250 L 249 261 C 248 263, 252 265, 256 263 C 260 265, 264 263, 263 261 Z" fill="#0f172a" />

    <!-- Teeth smiling grid -->
    <path d="M 226 295 Q 256 303 286 295 L 283 333 Q 256 345 229 333 Z" fill="#ffffff" stroke="#0f172a" stroke-width="6" stroke-linejoin="round" />
    <!-- Horizontal divide -->
    <path d="M 225 314 Q 256 321 287 314" fill="none" stroke="#0f172a" stroke-width="6" />
    <!-- Vertical tooth bars -->
    <line x1="238" y1="303" x2="240" y2="326" stroke="#0f172a" stroke-width="5" />
    <line x1="250" y1="305" x2="250" y2="333" stroke="#0f172a" stroke-width="5" />
    <line x1="262" y1="305" x2="262" y2="333" stroke="#0f172a" stroke-width="5" />
    <line x1="274" y1="303" x2="272" y2="326" stroke="#0f172a" stroke-width="5" />

    <!-- Straw Hat (beautifully nested overlapping brim and crown) -->
    <!-- Straw Hat Crown -->
    <path d="M 197 178 C 196 90, 316 90, 315 178 Z" fill="url(#strawHatGrad)" stroke="#0f172a" stroke-width="8" stroke-linejoin="round" />
    
    <!-- Red Lace Ribbon around crown -->
    <path d="M 196 166 C 205 164, 307 164, 316 166 L 314 182 C 305 180, 205 180, 198 182 Z" fill="#dc2626" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />

    <!-- Wide Straw Hat Brim curved dynamically -->
    <path d="M 152 186 Q 256 216 360 186 C 374 198, 362 216, 332 223 Q 256 238 180 223 C 150 216, 138 198, 152 186 Z" fill="url(#strawHatGrad)" stroke="#0f172a" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" />
  </g>

  <!-- Epic Haki Overlays & Jagged Red Lightning Cracks breaking across the logo outwards -->
  <g id="haki-lightning" filter="url(#haki-glow)">
    
    <!-- 1. Top-Left Epic Bolt -->
    <path d="M 210 210 L 165 180 L 140 215 L 90 145 L 45 160 L 12 110" 
          fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 210 210 L 165 180 L 140 215 L 90 145 L 45 160 L 12 110" 
          fill="none" stroke="#fecaca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Branch -->
    <path d="M 140 215 L 110 235 L 75 220" 
          fill="none" stroke="#ff0000" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 140 215 L 110 235 L 75 220" 
          fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />

    <!-- 2. Bottom-Left Epic Bolt -->
    <path d="M 215 285 L 155 315 L 132 290 L 85 365 L 35 340 L 10 425" 
          fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 215 285 L 155 315 L 132 290 L 85 365 L 35 340 L 10 425" 
          fill="none" stroke="#fecaca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Branch -->
    <path d="M 132 290 L 105 260 L 60 270" 
          fill="none" stroke="#ff0000" stroke-width="4" stroke-linecap="round" />

    <!-- 3. Top-Right Epic Bolt -->
    <path d="M 300 210 L 350 165 L 375 190 L 420 120 L 465 140 L 500 85" 
          fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 300 210 L 350 165 L 375 190 L 420 120 L 465 140 L 500 85" 
          fill="none" stroke="#fecaca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Branch -->
    <path d="M 375 190 L 415 220 L 460 205" 
          fill="none" stroke="#ff0000" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 375 190 L 415 220 L 460 205" 
          fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />

    <!-- 4. Bottom-Right Epic Bolt -->
    <path d="M 298 285 L 355 310 L 370 280 L 425 355 L 465 330 L 502 430" 
          fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 298 285 L 355 310 L 370 280 L 425 355 L 465 330 L 502 430" 
          fill="none" stroke="#fecaca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Branch -->
    <path d="M 370 280 L 405 250 L 450 260" 
          fill="none" stroke="#ff0000" stroke-width="4" stroke-linecap="round" />

    <!-- 5. Central Crack (Over Skull Forehead) -->
    <path d="M 235 150 L 250 175 L 240 195 L 265 210" 
          fill="none" stroke="#ff0000" stroke-width="4" stroke-linecap="round" />
    <path d="M 235 150 L 250 175 L 240 195 L 265 210" 
          fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />
  </g>
</svg>
